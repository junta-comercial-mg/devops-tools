<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🚀 Bootstrap Repository</title>
</head>

<body>

  <h2>🚀 Criar Repositório</h2>

  <!-- Nome -->
  <label>Nome do Repo</label><br>
  <input type="text" id="repo" placeholder="ex: api-mailing"><br><br>

  <!-- Área -->
  <label>Área</label><br>
  <select id="area"></select><br><br>

  <!-- Domínio -->
  <label>Domínio</label><br>
  <select id="domain"></select><br><br>

  <button onclick="createRepo()">Criar</button>

  <hr>

  <h2>📦 Catálogo de Repositórios</h2>
  <div id="catalog"></div>

  <!-- IMPORTANTE: config.js NÃO versionado -->
  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
