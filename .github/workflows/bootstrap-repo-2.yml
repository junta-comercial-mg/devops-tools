name: 🚀 Bootstrap Repository 2

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Nome do repositório"
        required: true

      area:
        description: "Área (sem prefixo area-)"
        required: true
        type: choice
        options:
          - dev
          - infra
          - db

      domain:
        description: "Domínio (ex: apis)"
        required: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: production

    env:
      ORG: junta-comercial-mg
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      # ✅ DEBUG
      - name: 🔍 Debug inputs
        run: |
          echo "Repo: ${{ github.event.inputs.repo_name }}"
          echo "Area: ${{ github.event.inputs.area }}"
          echo "Domain: ${{ github.event.inputs.domain }}"

      # ✅ VALIDACOES
      - name: 🔎 Validate naming & smart warnings
        run: |
          REPO="${{ github.event.inputs.repo_name }}"
          AREA="${{ github.event.inputs.area }}"
          DOMAIN="${{ github.event.inputs.domain }}"
      
          echo ""
          echo "========================================"
          echo "🔎 NAMING & CONSISTENCY CHECK"
          echo "========================================"
          echo "Repo: $REPO"
          echo "Área: $AREA"
          echo "Domínio: ${DOMAIN:-<não informado>}"
          echo ""
      
          # =======================================
          # ✅ PRÉ-VALIDAÇÃO (REGRAS DE NOMENCLATURA)
          # =======================================
      
          echo "✅ Validando nome do repositório..."
      
          # Regra base
          if [[ ! "$REPO" =~ ^[a-z0-9-]+$ ]]; then
            echo "❌ Nome inválido"
            echo "👉 Use apenas: letras minúsculas, números e '-'"
            exit 1
          fi
      
          # Não começar ou terminar com "-"
          if [[ "$REPO" == -* || "$REPO" == *- ]]; then
            echo "❌ Nome não pode começar ou terminar com '-'"
            exit 1
          fi
      
          # Evitar duplicação de hífen
          if [[ "$REPO" == *"--"* ]]; then
            echo "❌ Nome não pode conter '--'"
            exit 1
          fi
      
          # Tamanho mínimo
          if [ ${#REPO} -lt 3 ]; then
            echo "❌ Nome muito curto"
            exit 1
          fi
      
          echo "✅ Naming válido"
          echo ""
      
          # =======================================
          # ⚠️ WARNINGS INTELIGENTES (NÃO BLOQUEIAM)
          # =======================================      
          echo "🧠 Análise inteligente..."      
          # Naming pouco expressivo
          if [[ "$REPO" != *-* ]]; then
            echo "⚠️ Sugestão: use nomes compostos (ex: api-mailing)"
          fi
      
          # Nome muito genérico
          if [[ "$REPO" == "test" || "$REPO" == "app" || "$REPO" == "api" ]]; then
            echo "⚠️ Nome muito genérico — pode causar confusão no futuro"
          fi
      
          echo ""
          echo "✅ Validação concluída"



      # ✅ 1. VALIDAR TEAMS DE PERMISSÃO
      - name: 🔐 Validate permission teams
        run: |
          AREA="${{ github.event.inputs.area }}"

          gh api /orgs/$ORG/teams/perm-$AREA-developer \
            || { echo "❌ perm-$AREA-developer não existe"; exit 1; }

          gh api /orgs/$ORG/teams/perm-$AREA-maintainer \
            || { echo "❌ perm-$AREA-maintainer não existe"; exit 1; }

      # ✅ 2. VALIDAR DOMAIN A PARTIR DA HIERARQUIA
      - name: 🎯 Validate domain requirement based on area
        run: |
          AREA="area-${{ github.event.inputs.area }}"
          INPUT_DOMAIN="${{ github.event.inputs.domain }}"
      
          echo ""
          echo "========================================"
          echo "🎯 DOMAIN VALIDATION (SMART RULE)"
          echo "========================================"
          echo "Área: $AREA"
          echo "Domain informado: ${INPUT_DOMAIN:-<nenhum>}"
          echo ""
      
          echo "🔍 Buscando subteams da área..."
      
          # Buscar subteams da área
          SUBTEAMS=$(gh api /orgs/$ORG/teams \
            -q ".[] | select(.parent != null and .parent.slug == \"$AREA\") | .slug")
      
          # Extrair grp-*
          DOMAINS=$(echo "$SUBTEAMS" | grep '^grp-' | sed 's/grp-//')
      
          echo ""
          echo "✅ Domínios disponíveis:"
          echo "$DOMAINS"
          echo ""
      
          # =========================================
          # ✅ REGRA PRINCIPAL
          # =========================================
      
          if [ -n "$DOMAINS" ]; then
            echo "🧠 Área possui domínios obrigatórios"
      
            # 🔴 Domain NÃO informado
            if [ -z "$INPUT_DOMAIN" ]; then
              echo ""
              echo "❌ Esta área possui domínios e requer 'domain'"
              echo ""
              echo "👉 Informe um dos seguintes:"
              for d in $DOMAINS; do
                echo "   - $d"
              done
              exit 1
            fi
      
            # 🔴 Domain inválido
            if ! echo "$DOMAINS" | grep -w "$INPUT_DOMAIN" > /dev/null; then
              echo ""
              echo "❌ Domínio inválido: $INPUT_DOMAIN"
              echo ""
              echo "✅ Use um dos seguintes:"
              for d in $DOMAINS; do
                echo "   - $d"
              done
              exit 1
            fi
      
            echo "✅ Domínio válido: $INPUT_DOMAIN"
      
          else
            echo "🧠 Área NÃO possui domínios (grp-*)"
      
            # ✅ Não obrigatório, mas pode avisar
            if [ -n "$INPUT_DOMAIN" ]; then
              echo "⚠️ Domain informado será ignorado pois não há grp-* nessa área"
            fi
          fi

      # ✅ 3. CRIAR REPOSITÓRIO (IDEMPOTENTE)
      - name: 📦 Create repository
        run: |
          REPO="${{ github.event.inputs.repo_name }}"

          if gh repo view $ORG/$REPO > /dev/null 2>&1; then
            echo "✅ Repo já existe"
          else
            echo "🚀 Criando repo $REPO"
            gh repo create $ORG/$REPO --private --confirm
          fi

      # ✅ 4. APLICAR PERMISSÕES (IDEMPOTENTE)
      - name: 🔐 Apply permissions
        run: |
          REPO="${{ github.event.inputs.repo_name }}"
          AREA="${{ github.event.inputs.area }}"

          echo "👉 perm-$AREA-developer (write)"
          gh api \
            --method PUT \
            /orgs/$ORG/teams/perm-$AREA-developer/repos/$ORG/$REPO \
            -f permission=push

          echo "👉 perm-$AREA-maintainer (maintain)"
          gh api \
            --method PUT \
            /orgs/$ORG/teams/perm-$AREA-maintainer/repos/$ORG/$REPO \
            -f permission=maintain

      # ✅ 5. APLICAR TOPIC (SE EXISTIR DOMÍNIO)
      - name: 🏷️ Apply topic
        if: ${{ github.event.inputs.domain != '' }}
        run: |
          REPO="${{ github.event.inputs.repo_name }}"
          DOMAIN="${{ github.event.inputs.domain }}"

          echo "👉 Aplicando topic: $DOMAIN"
          gh repo edit $ORG/$REPO --add-topic "$DOMAIN" || true

      # ✅ 6. AUTO-CORREÇÃO
      - name: 🔄 Ensure topic consistency
        if: ${{ github.event.inputs.domain != '' }}
        run: |
          REPO="${{ github.event.inputs.repo_name }}"
          DOMAIN="${{ github.event.inputs.domain }}"

          CURRENT=$(gh repo view $ORG/$REPO \
            --json repositoryTopics \
            -q '.repositoryTopics[].topic.name')

          if ! echo "$CURRENT" | grep -w "$DOMAIN" > /dev/null; then
            echo "⚠️ Corrigindo topic"
            gh repo edit $ORG/$REPO --add-topic "$DOMAIN"
          fi

      # ✅ 7. FINAL
      - name: ✅ Done
        run: |
          echo "🎉 Bootstrap concluído!"
          echo "Repo: ${{ github.event.inputs.repo_name }}"
