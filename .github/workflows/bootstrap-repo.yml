name: 🚀 Bootstrap Repository

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Nome do repositório"
        required: true
      area:
        description: "Área (dev, infra, db)"
        required: true
      domain:
        description: "Domínio (apis, apps, jmss)"
        required: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    env:
      ORG: junta-comercial-mg
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      # ✅ 1. VALIDAR INPUT
      - name: ✅ Validate inputs
        run: |
          case "${{ github.event.inputs.domain }}" in
            apis|apps|jmss) echo "Domain OK" ;;
            *) echo "❌ Invalid domain"; exit 1 ;;
          esac

          case "${{ github.event.inputs.area }}" in
            dev|infra|db) echo "Area OK" ;;
            *) echo "❌ Invalid area"; exit 1 ;;
          esac

      # ✅ 2. VALIDAR TEAM EXISTE
      - name: 🔍 Check required teams
        run: |
          gh api /orgs/$ORG/teams/grp-${{ github.event.inputs.domain }} \
            || { echo "❌ Team grp-${{ github.event.inputs.domain }} não existe"; exit 1; }

          gh api /orgs/$ORG/teams/perm-${{ github.event.inputs.area }}-developer \
            || { echo "❌ perm-developer não existe"; exit 1; }

          gh api /orgs/$ORG/teams/perm-${{ github.event.inputs.area }}-maintainer \
            || { echo "❌ perm-maintainer não existe"; exit 1; }

      # ✅ 3. CRIAR REPO (IDEMPOTENTE)
      - name: 📦 Create repository (idempotent)
        run: |
          REPO="${{ github.event.inputs.repo_name }}"

          if gh repo view $ORG/$REPO > /dev/null 2>&1; then
            echo "✅ Repo já existe"
          else
            echo "🚀 Criando repo $REPO"
            gh repo create $ORG/$REPO --private --confirm
          fi

      # ✅ 4. GARANTIR PERMISSÕES (IDEMPOTENTE)
      - name: 🔐 Apply permissions
        run: |
          REPO="${{ github.event.inputs.repo_name }}"
          AREA="${{ github.event.inputs.area }}"

          echo "👉 Aplicando perm-dev-developer"
          gh api \
            --method PUT \
            /orgs/$ORG/teams/perm-$AREA-developer/repos/$ORG/$REPO \
            -f permission=push

          echo "👉 Aplicando perm-dev-maintainer"
          gh api \
            --method PUT \
            /orgs/$ORG/teams/perm-$AREA-maintainer/repos/$ORG/$REPO \
            -f permission=maintain

      # ✅ 5. GARANTIR TOPIC
      - name: 🏷️ Apply topic
        run: |
          REPO="${{ github.event.inputs.repo_name }}"
          DOMAIN="${{ github.event.inputs.domain }}"

          echo "👉 Aplicando topic $DOMAIN"
          gh repo edit $ORG/$REPO --add-topic $DOMAIN || true

      # ✅ 6. AUTO-CORREÇÃO (opcional)
      - name: 🔄 Ensure consistency
        run: |
          REPO="${{ github.event.inputs.repo_name }}"
          DOMAIN="${{ github.event.inputs.domain }}"

          echo "🔍 Verificando estado..."

          # garante topic
          CURRENT=$(gh repo view $ORG/$REPO --json repositoryTopics -q '.repositoryTopics[].topic.name')

          if [[ "$CURRENT" != *"$DOMAIN"* ]]; then
            echo "⚠️ Corrigindo topic"
            gh repo edit $ORG/$REPO --add-topic $DOMAIN
          fi

      # ✅ 7. FINAL
      - name: ✅ Done
        run: |
          echo "🎉 Bootstrap concluído com sucesso!"
